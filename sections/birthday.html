<!DOCTYPE html>
<html lang="en">
<head>
  <title>BDay-Countdown</title>
  <meta name="viewport" content="width=device-width, initial-scale=0.8">
  <link rel="icon" type="image/jpeg" href="../chamf_imgs/bday/timer.jpg">
  <style type="text/css">
 body {
    background-color: black;
    background-image: url("../chamf_imgs/bday/blackwall.jpeg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center center;
    color: red;
    font-family: serif;
    margin: 0;
    padding: 0;
}

    h1 {
      text-align: right;
      margin: 10px 30px 0 0;
      font-size: 20px;
      color:red
    }

    .countdown-container {
      text-align: center;
      margin-top: 100px;
    }

    .countdown-line {
      font-size: 24px;
      margin: 20px 0;
    }

    .time-part {
      display: inline-block;
      width: 80px;
      margin: 0 5px;
    }

    #footer {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
      color: red;
    }
  .button {
    display: inline-block;
    padding: 5px 10px;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    color: #000; /* Black text for contrast */
    background: linear-gradient(to bottom, 
        rgba(200, 40, 40, 0.8) 0%,     /* Dark red */
        rgba(220, 60, 60, 0.8) 50%,    /* Medium red */
        rgba(240, 90, 90, 0.8) 51%,    /* Lighter red */
        rgba(255, 150, 150, 0.8) 100%  /* Very light red */
    );
    border-radius: 5px;
    border: 1px solid #a12020; /* Dark red border */
    box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.6),
        0 1px 3px rgba(0,0,0,0.3);
    text-shadow: 0 1px 1px rgba(255,255,255,0.7);
}

.button:hover {
  padding: 2px 2px;
    background: linear-gradient(to bottom, 
        rgba(230, 80, 80, 0.8) 0%,     /* Lighter red */
        rgba(245, 120, 120, 0.8) 50%,  /* Even lighter */
        rgba(255, 170, 170, 0.8) 51%,  /* Very light */
        rgba(255, 200, 200, 0.8) 100%  /* Almost white pink */
    );
}

.button:active {
  padding: 10px 15px;
    background: linear-gradient(to bottom, 
        rgba(160, 20, 20, 0.8) 2%,     /* Deep dark red */
        rgba(200, 40, 40, 0.8) 69%,    /* Dark red */
        rgba(220, 60, 60, 0.8) 80%,    /* Medium red */
        rgba(255, 150, 150, 0.8) 100%  /* Light red */
    );
}

  </style>
</head>
<body>
<div style="display: none;">
  <audio autoplay loop>
    <source src="../mp3/clock-tick.mp3" type="audio/mpeg">
  </audio>
</div>
  <h1>Countdown until Chris's birthday</h1>

  <div class="countdown-container">
    <div class="countdown-line" id="line1">
     <img src="../chamf_imgs/bday/Timer.gif" width="128" height="128">
     <p>.</p>
      <span class="time-part" id="months">00</span>months
      <span class="time-part" id="weeks">00</span>weeks
      <span class="time-part" id="days">00</span>days
    </div>
    <div class="countdown-line" id="line2">
      <span class="time-part" id="hours">00</span>hours
      <span class="time-part" id="minutes">00</span>minutes
      <span class="time-part" id="seconds">00</span>seconds
    </div>
  </div>
  <div id="footer">&copy; 2024-2026 Hamfield518- all rights reserved, lefts preserved.</div>

  <script type="text/javascript">
    function getNextJan24(now) {
      var year = (now.getMonth() > 0 || (now.getMonth() === 0 && now.getDate() > 24)) ?
        now.getFullYear() + 1 : now.getFullYear();
      return new Date(year, 0, 24, 0, 0, 0);
    }

    function format(value) {
      return value < 10 ? '0' + value : '' + value;
    }

    var previous = {
      months: null,
      weeks: null,
      days: null,
      hours: null,
      minutes: null,
      seconds: null
    };

    function updateCountdown() {
      var now = new Date();
      var target = getNextJan24(now);
      var diff = target - now;

      if (diff <= 0) {
        document.getElementById("line1").innerHTML = "It's Chris's birthday!";
        document.getElementById("line2").innerHTML = "";
        return;
      }

      var totalSeconds = Math.floor(diff / 1000);

      var secondsInMinute = 60;
      var secondsInHour = 60 * secondsInMinute;
      var secondsInDay = 24 * secondsInHour;
      var secondsInWeek = 7 * secondsInDay;
      var avgSecondsInMonth = 30.44 * secondsInDay;

      var months = Math.floor(totalSeconds / avgSecondsInMonth);
      totalSeconds %= avgSecondsInMonth;

      var weeks = Math.floor(totalSeconds / secondsInWeek);
      totalSeconds %= secondsInWeek;

      var days = Math.floor(totalSeconds / secondsInDay);
      totalSeconds %= secondsInDay;

      var hours = Math.floor(totalSeconds / secondsInHour);
      totalSeconds %= secondsInHour;

      var minutes = Math.floor(totalSeconds / secondsInMinute);
      var seconds = totalSeconds % secondsInMinute;

      updateElement('months', months);
      updateElement('weeks', weeks);
      updateElement('days', days);
      updateElement('hours', hours);
      updateElement('minutes', minutes);
      updateElement('seconds', seconds, false);
    }

    function updateElement(id, newVal, animate) {
      if (typeof animate === 'undefined') animate = true;

      var element = document.getElementById(id);
      var formatted = format(newVal);

      if (previous[id] !== newVal) {
        element.innerText = formatted;
        previous[id] = newVal;
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; URL=https://hamfield518.neocities.org/chamf_files/sections/jsrequirement.html">
</noscript>
  <center>

</center>
</body>
</html>
