    <style>
      p {
        color: purple;

        background-color: black;

        .button-container {

            display: inline-block;
            padding: 3px 5px;

            text-decoration: none;
            color: #000;
            background: linear-gradient(to bottom,

                rgba(220, 60, 60, 0.8) 50%,
                rgba(240, 90, 90, 0.8) 51%,
                rgba(255, 150, 150, 0.8) 100%
            );
            border-radius: 5px;
            border: 1px solid #a12020;

            text-shadow: 0 1px 1px rgba(255,255,255,0.7);

                rgba(245, 120, 120, 0.8) 50%,
                rgba(255, 170, 170, 0.8) 51%,
                rgba(255, 200, 200, 0.8) 100%
            );
        }

        .button:active {
            background: linear-gradient(to bottom,
                rgba(160, 20, 20, 0.8) 2%,
                rgba(200, 40, 40, 0.8) 69%,
                rgba(220, 60, 60, 0.8) 80%,
                rgba(255, 150, 150, 0.8) 100%
            );
        }
dialog {

<dialog id="CrushInquiry">

    <button id="checkLogBtn">Why?</button>

<script>

  const checkLogBtn = document.getElementById('checkLogBtn');
  const closeBtn = document.getElementById('closeBtn');
  function openDialog() {
    dialog.showModal();
  }
  checkLogBtn.addEventListener('click', () => {
    alert("The error is bollocks, who would actually reveal their crush on a publically accessible website? I ain't that stupid.");
    dialog.close();
  });
  closeBtn.addEventListener('click', () => {
    dialog.close();
  });
</script>
